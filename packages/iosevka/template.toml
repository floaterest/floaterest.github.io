[buildPlans.template]
family = "template"
spacing = "fontconfig-mono"
serifs = "sans"
noCvSs = false
exportGlyphNames = true

[buildPlans.template.widths.normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.template.variants.design]
capital-b = "standard-interrupted-serifless"
capital-g = "toothless-corner-serifless-hooked"
capital-p = "open-serifless"
capital-q = "crossing-baseline"
capital-r = "straight-open-serifless"
capital-u = "toothless-corner-serifless"
a = "double-storey-toothless-corner"
b = "toothless-corner-serifless"
d = "toothless-corner-serifless"
f = "flat-hook-serifless"
g = "single-storey-earless-corner"
m = "earless-corner-double-arch-serifless"
n = "earless-corner-straight-serifless"
p = "earless-corner-serifless"
q = "earless-corner-straight-serifless"
r = "hookless-serifless"
t = "flat-hook"
u = "toothless-corner-serifless"
lower-tau = "semi-tailed"
two = "straight-neck"
six = "closed-contour"
seven = "straight-serifed"
eight = "crossing-asymmetric"
nine = "closed-contour"
brace = "straight"
lig-ltgteq = "slanted"
lig-equal-chain = "without-notch"
lig-hyphen-chain = "without-notch"
dollar = "interrupted-cap"
cent = "open"

[buildPlans.template.variants.italic]
capital-a = "curly-serifless"
capital-b = "more-asymmetric-interrupted-serifless"
capital-d = "more-rounded-serifless"
capital-g = "toothless-corner-serifless-hookless"
capital-k = "curly-serifless"
capital-m = "slanted-sides-hanging-serifless"
capital-p = "open-serifless"
capital-q = "horizontal-tailed"
capital-r = "curly-open-serifless"
capital-u = "toothless-rounded-serifless"
capital-v = "curly-serifless"
capital-w = "curly-serifless"
capital-x = "curly-serifless"
capital-y = "curly-serifless"
capital-z = "curly-serifless"
a = "double-storey-toothless-rounded"
b = "toothless-rounded-serifless"
d = "toothless-rounded-serifless"
g = "single-storey-earless-rounded"
m = "earless-rounded-double-arch-serifless"
n = "earless-rounded-straight-serifless"
p = "earless-rounded-serifless"
q = "earless-rounded-straight-serifless"
r = "earless-corner-serifless"
t = "flat-hook"
u = "toothless-rounded-serifless"
v = "curly-serifless"
w = "curly-serifless"
x = "curly-serifless"
z = "curly-serifless"
eszet = "sulzbacher-serifless"
lower-tau = "semi-tailed"
two = "curly-neck"
six = "open-contour"
seven = "bend-serifed"
eight = "crossing-asymmetric"
nine = "open-contour"
brace = "straight"
lig-ltgteq = "slanted"
lig-double-arrow-bar = "with-notch"
lig-single-arrow-bar = "with-notch"

[buildPlans.template.slopes.upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.template.slopes.italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

# [buildPlans.template.ligations]
# inherits = "dlig"

[buildPlans.template.ligations]
enables = [
    "arrow-l", "arrow-r", "arrow-lr",
    "counter-arrow-l", "counter-arrow-r",
    "trig",
    "eqeqeq", "eqeq", "lteq", "gteq", "exeq", "slasheq",
    "ltgt-slash-tag", "slash-asterisk", "plusplus",
    "kern-dotty", "kern-bars",
    "logic", "llgg", "llggeq", "html-comment",
    "connected-underscore", "connected-number-sign", "connected-hyphen"
]
